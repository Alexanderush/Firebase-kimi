# Firebase App Hosting configuration for Kimi AI Agency Platform
# Docs: https://firebase.google.com/docs/app-hosting

runConfig:
  runtime: nodejs20
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  maxInstances: 3
  minInstances: 0

env:
  # Public environment variables
  - variable: NEXTAUTH_URL
    value: https://kimi-agent-57bb1.web.app

  # Secrets (stored in Google Cloud Secret Manager, managed via Firebase Console)
  - variable: DATABASE_URL
    secret: DATABASE_URL

  - variable: NEXTAUTH_SECRET
    secret: NEXTAUTH_SECRET

  - variable: NVIDIA_API_KEY
    secret: NVIDIA_API_KEY

  - variable: NVIDIA_BASE_URL
    value: https://integrate.api.nvidia.com/v1

  - variable: KIMI_MODEL
    value: moonshotai/kimi-k2.5

  - variable: GOOGLE_CLIENT_ID
    secret: GOOGLE_CLIENT_ID

  - variable: GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET

  - variable: META_CLIENT_ID
    secret: META_CLIENT_ID

  - variable: META_CLIENT_SECRET
    secret: META_CLIENT_SECRET

  - variable: WHATSAPP_PHONE_NUMBER_ID
    secret: WHATSAPP_PHONE_NUMBER_ID

  - variable: WHATSAPP_WEBHOOK_VERIFY_TOKEN
    secret: WHATSAPP_WEBHOOK_VERIFY_TOKEN

  - variable: PRISMA_CLIENT_ENGINE_TYPE
    value: library
